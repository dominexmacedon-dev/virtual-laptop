<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Old School Desktop</title>
<style>
    body {
        margin: 0;
        font-family: "Courier New", monospace;
        background: teal;
        overflow: hidden;
    }

    /* Desktop */
    #desktop {
        width: 100vw;
        height: 100vh;
        position: relative;
    }

    /* Icons */
    .icon {
        width: 80px;
        text-align: center;
        color: white;
        cursor: pointer;
        margin: 10px;
    }

    .icon img {
        width: 48px;
        height: 48px;
    }

    /* Window */
    .window {
        width: 400px;
        background: #c0c0c0;
        border: 2px solid black;
        position: absolute;
        top: 100px;
        left: 100px;
        display: none;
    }

    .title-bar {
        background: navy;
        color: white;
        padding: 5px;
        cursor: move;
        display: flex;
        justify-content: space-between;
    }

    .title-bar button {
        background: red;
        border: none;
        color: white;
        cursor: pointer;
    }

    .content {
        padding: 10px;
        background: black;
        color: lime;
        height: 250px;
        overflow-y: auto;
    }

    /* Taskbar */
    #taskbar {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 40px;
        background: #c0c0c0;
        display: flex;
        align-items: center;
    }

    #start {
        background: gray;
        padding: 5px 10px;
        margin: 5px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="desktop">

    <!-- Icon -->
    <div class="icon" ondblclick="openWindow()">
        <img src="https://cdn-icons-png.flaticon.com/512/32/32339.png">
        <div>My Computer</div>
    </div>

    <!-- Window -->
    <div id="cmdWindow" class="window">
        <div class="title-bar" onmousedown="dragStart(event)">
            <span>Command Prompt</span>
            <button onclick="closeWindow()">X</button>
        </div>
        <div class="content" id="cmdContent"></div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start">Start</div>
    </div>

</div>

<script>
let cmdLines = [
    "Microsoft Windows [Version 4.00.950]",
    "(C) Copyright Microsoft Corp 1981-1995.",
    "",
    "C:\\Users\\You> loading feelings.exe",
    "...",
    "Processing...",
    "",
    "C:\\Users\\You> system check",
    "Heart status: ♥ ACTIVE",
    "",
    "C:\\Users\\You> run kyalsin.exe",
    "",
    "Hello, Kyal Sin.",
    "I have something important to ask...",
    "",
    ">>> Will you be part of my life? (Y/N)"
];

let i = 0;

function openWindow() {
    document.getElementById("cmdWindow").style.display = "block";
    typeText();
}

function closeWindow() {
    document.getElementById("cmdWindow").style.display = "none";
    document.getElementById("cmdContent").innerHTML = "";
    i = 0;
}

function typeText() {
    if (i < cmdLines.length) {
        let content = document.getElementById("cmdContent");
        content.innerHTML += cmdLines[i] + "<br>";
        content.scrollTop = content.scrollHeight;
        i++;
        setTimeout(typeText, 600);
    } else {
        addButtons();
    }
}

function addButtons() {
    let content = document.getElementById("cmdContent");
    content.innerHTML += "<br><button onclick='answer(true)'>Y</button> ";
    content.innerHTML += "<button onclick='answer(false)'>N</button>";
}

function answer(val) {
    let content = document.getElementById("cmdContent");
    if (val) {
        content.innerHTML += "<br><br>>> Response: YES detected ❤️";
        content.innerHTML += "<br>Launching happiness.exe...";
    } else {
        content.innerHTML += "<br><br>>> Response: NO detected 💔";
        content.innerHTML += "<br>System shutting down emotions...";
    }
}

/* Dragging */
let offsetX, offsetY, isDragging = false;

function dragStart(e) {
    let win = document.getElementById("cmdWindow");
    isDragging = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;

    document.onmousemove = dragMove;
    document.onmouseup = dragEnd;
}

function dragMove(e) {
    if (isDragging) {
        let win = document.getElementById("cmdWindow");
        win.style.left = (e.clientX - offsetX) + "px";
        win.style.top = (e.clientY - offsetY) + "px";
    }
}

function dragEnd() {
    isDragging = false;
    document.onmousemove = null;
    document.onmouseup = null;
}
</script>

</body>
</html>
