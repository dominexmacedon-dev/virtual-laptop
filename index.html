<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retro OS</title>

<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: teal;
    overflow: hidden;
}

/* Desktop */
#desktop {
    width: 100vw;
    height: 100vh;
    position: relative;
}

/* Icons */
.icon {
    width: 80px;
    text-align: center;
    color: white;
    cursor: pointer;
    position: absolute;
}
.icon img {
    width: 48px;
}
.icon:hover {
    background: rgba(255,255,255,0.2);
}

/* Windows */
.window {
    position: absolute;
    background: #c0c0c0;
    border: 2px solid black;
    display: none;
    box-shadow: 4px 4px black;
}

.title-bar {
    background: navy;
    color: white;
    padding: 5px;
    cursor: move;
    display: flex;
    justify-content: space-between;
}

.title-bar button {
    background: red;
    border: none;
    color: white;
    cursor: pointer;
}

/* CMD */
.cmd {
    background: black;
    color: lime;
    padding: 10px;
    height: 100%;
    overflow-y: auto;
}

/* Taskbar */
#taskbar {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: #c0c0c0;
    display: flex;
    align-items: center;
}

#start {
    background: gray;
    padding: 5px 15px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="desktop">

    <!-- Icons -->
    <div class="icon" style="top:20px;left:20px" ondblclick="openCMD()">
        <img src="https://cdn-icons-png.flaticon.com/512/32/32339.png">
        <div>My Computer</div>
    </div>

    <div class="icon" style="top:120px;left:20px" ondblclick="openApp('notes')">
        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
        <div>Notes</div>
    </div>

    <div class="icon" style="top:220px;left:20px" ondblclick="openApp('photos')">
        <img src="https://cdn-icons-png.flaticon.com/512/337/337940.png">
        <div>Photos</div>
    </div>

    <!-- CMD Window (FULLSCREEN STYLE) -->
    <div id="cmdWindow" class="window" style="top:0;left:0;width:100%;height:100%;z-index:10;">
        <div class="title-bar" onmousedown="dragStart(event,'cmdWindow')">
            <span>Command Prompt</span>
            <button onclick="closeWindow('cmdWindow')">X</button>
        </div>
        <div id="cmdContent" class="cmd"></div>
    </div>

    <!-- Notes -->
    <div id="notes" class="window" style="width:300px;height:200px;top:150px;left:200px;">
        <div class="title-bar" onmousedown="dragStart(event,'notes')">
            <span>Notes</span>
            <button onclick="closeWindow('notes')">X</button>
        </div>
        <div style="padding:10px;">💌 Something special is hidden in CMD...</div>
    </div>

    <!-- Photos -->
    <div id="photos" class="window" style="width:300px;height:200px;top:200px;left:300px;">
        <div class="title-bar" onmousedown="dragStart(event,'photos')">
            <span>Photos</span>
            <button onclick="closeWindow('photos')">X</button>
        </div>
        <div style="padding:10px;">📷 Memories loading...</div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start">Start</div>
    </div>

</div>

<script>
let z = 10;

/* Window control */
function openApp(id){
    let w = document.getElementById(id);
    w.style.display = "block";
    focusWindow(w);
}

function closeWindow(id){
    document.getElementById(id).style.display = "none";
}

/* Focus */
function focusWindow(win){
    z++;
    win.style.zIndex = z;
}

/* CMD */
let cmdLines = [
"Microsoft Windows [Version 4.00.950]",
"",
"C:\\> initializing...",
"C:\\> loading emotions.sys",
"",
"C:\\> run kyalsin.exe",
"",
"Hello, Kyal Sin.",
"",
">> I didn't want to say this normally...",
">> So I made this instead.",
"",
">> Will you be part of my life? (Y/N)"
];

function openCMD(){
    let win = document.getElementById("cmdWindow");
    win.style.display = "block";
    focusWindow(win);
    fastType();
}

function fastType(){
    let content = document.getElementById("cmdContent");
    content.innerHTML = "";

    cmdLines.forEach((line, i)=>{
        setTimeout(()=>{
            content.innerHTML += line + "<br>";
            content.scrollTop = content.scrollHeight;
        }, i * 150); // FAST typing
    });

    setTimeout(showChoices, cmdLines.length * 150);
}

function showChoices(){
    let content = document.getElementById("cmdContent");
    content.innerHTML += `
        <br>
        <button onclick="answer(true)">Y</button>
        <button onclick="answer(false)">N</button>
    `;
}

function answer(val){
    let content = document.getElementById("cmdContent");
    if(val){
        content.innerHTML += "<br><br>>> YES detected ❤️";
        content.innerHTML += "<br>Launching forever.exe...";
    } else {
        content.innerHTML += "<br><br>>> NO detected 💔";
        content.innerHTML += "<br>Retrying love.exe...";
    }
}

/* Dragging */
let drag = null, offsetX=0, offsetY=0;

function dragStart(e,id){
    drag = document.getElementById(id);
    focusWindow(drag);
    offsetX = e.clientX - drag.offsetLeft;
    offsetY = e.clientY - drag.offsetTop;

    document.onmousemove = (e)=>{
        if(drag){
            drag.style.left = (e.clientX - offsetX) + "px";
            drag.style.top = (e.clientY - offsetY) + "px";
        }
    };

    document.onmouseup = ()=>{
        drag = null;
    };
}
</script>

</body>
</html>
